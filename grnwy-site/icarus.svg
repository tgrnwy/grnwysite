<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#14121e"/>
  <!-- Purple atmospheric wash -->
  <radialGradient id="purp" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#3d2a5a" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#14121e" stop-opacity="0"/>
  </radialGradient>
  <rect width="800" height="800" fill="url(#purp)"/>
  <!-- Orb -->
  <circle cx="400" cy="380" r="200" fill="#e8e4d8" opacity="0.08"/>
  <circle cx="400" cy="380" r="195" fill="none" stroke="#c8c4b8" stroke-width="0.5" opacity="0.2"/>
  <!-- Figure/monolith -->
  <rect x="370" y="180" width="50" height="400" fill="#1a1520" opacity="0.9"/>
  <!-- Horizontal bars -->
  <rect x="300" y="320" width="200" height="8" fill="#1a1520" opacity="0.7"/>
  <rect x="300" y="360" width="200" height="6" fill="#1a1520" opacity="0.5"/>
  <rect x="300" y="395" width="200" height="5" fill="#1a1520" opacity="0.4"/>
  <!-- Label -->
  <text x="400" y="720" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#7a7668" text-anchor="middle" letter-spacing="3">Icarus</text>
  <text x="400" y="750" font-family="Courier New, monospace" font-size="10" fill="#3a3832" text-anchor="middle" letter-spacing="4">ARCHIVAL IMAGE PENDING</text>
</svg>
